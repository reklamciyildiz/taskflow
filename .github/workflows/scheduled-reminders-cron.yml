# Optional backup: calls GET /api/cron/reminders-tick (absolute + due-date reminders).
#
# GitHub `schedule` is best-effort — */10 often runs MUCH less frequently in practice.
# For predictable 5–10 minute ticks, use an external HTTP cron (see docs/REMINDERS_CRON.md),
# e.g. cron-job.org with Authorization: Bearer CRON_SECRET. You can disable this workflow
# once external cron is verified, to reduce duplicate invocations (dedupe still prevents most duplicate alerts).
#
# Repo → Settings → Secrets and variables → Actions → tab "Secrets"
# → "New repository secret" (NOT Environments / environment secrets, unless
# you add `environment: ...` to the job below).
#   CRON_BASE_URL   e.g. https://your-app.vercel.app  (no trailing slash)
#   CRON_SECRET     exact same string as Vercel + .env.local (do not commit .env.local)
#
# The route is idempotent (notification dedupe); overlapping Vercel + GHA is OK.
# See docs/REMINDERS_CRON.md for Vercel Pro vs Hobby scheduling.

name: Cron — scheduled reminders

on:
  schedule:
    # Intended: every 10 minutes UTC. Actual spacing is often 40–90+ minutes (GitHub scheduler).
    # Do not rely on this for "5 minutes before" SLA — use docs/REMINDERS_CRON.md external cron.
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scheduled-reminders-external-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reminders-tick API
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_BASE_URL or CRON_SECRET not set — skipping (configure Action secrets for production)."
            exit 0
          fi
          BASE="${CRON_BASE_URL%/}"
          echo "Triggering reminders-tick…"
          curl -sfS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/reminders-tick"
